<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orderly — Login &amp; Sign Up</title>
  <meta name="description" content="Log in or create your Orderly account.">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-layout { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100dvh - 72px); }
    .auth-panel { display: flex; align-items: center; justify-content: center; padding: var(--space-11) var(--space-8); }
    .auth-form { width: 100%; max-width: 400px; }
    .auth-brand { display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--color-teal-light) 0%, var(--color-rose-light) 100%); padding: var(--space-11); }
    .auth-brand-title { font-family: var(--font-display); font-size: 48px; font-weight: 700; letter-spacing: -1.44px; color: var(--color-near-black); text-align: center; margin-bottom: var(--space-4); }
    .auth-brand-desc { font-family: var(--font-body); font-size: 18px; color: var(--color-slate); text-align: center; max-width: 320px; line-height: 1.5; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: var(--space-7); border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--color-input-border); }
    .auth-tab { flex: 1; text-align: center; padding: 12px; font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--color-slate); cursor: pointer; background: var(--color-white); transition: all var(--duration-fast) var(--ease-smooth); }
    .auth-tab.active { background: var(--color-blue-450); color: var(--color-white); }
    .social-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--color-near-black); background: var(--color-white); cursor: pointer; transition: all var(--duration-fast) var(--ease-smooth); }
    .social-btn:hover { border-color: var(--color-near-black); background: var(--color-surface-soft); }
    .auth-link { font-family: var(--font-body); font-size: 14px; color: var(--color-slate); text-align: center; margin-top: var(--space-5); }
    .auth-link a { color: var(--color-blue-450); font-weight: 600; }
    @media (max-width: 768px) { .auth-layout { grid-template-columns: 1fr; } .auth-brand { display: none; } }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="homepage.html" class="topnav-logo">orderly</a>
    <div class="topnav-right">
      <a href="#" class="btn btn-ghost btn-sm">Need help?</a>
    </div>
  </nav>

  <div class="auth-layout">
    <!-- LEFT: Form -->
    <div class="auth-panel">
      <div class="auth-form animate-fade-up">
        <div class="auth-tabs">
          <div class="auth-tab active" id="tabLogin">Log In</div>
          <div class="auth-tab" id="tabSignup">Sign Up</div>
        </div>

        <!-- LOGIN -->
        <div id="formLogin">
          <div class="flex-col gap-4" style="display:flex;flex-direction:column;gap:16px;">
            <div class="input-group">
              <label class="input-label">Email</label>
              <input type="email" class="input" placeholder="you@university.edu">
            </div>
            <div class="input-group">
              <label class="input-label">Password</label>
              <input type="password" class="input" placeholder="Enter your password">
            </div>
            <div style="text-align:right;"><a href="#" style="font-size:14px;font-weight:500;">Forgot password?</a></div>
            <button class="btn btn-primary btn-full">Log In</button>
            <div class="divider-text">or</div>
            <button class="social-btn">
              <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              Continue with Google
            </button>
          </div>
          <p class="auth-link">Don't have an account? <a href="#" onclick="document.getElementById('tabSignup').click()">Sign Up</a></p>
        </div>

        <!-- SIGNUP (hidden by default) -->
        <div id="formSignup" style="display:none;">
          <div class="flex-col gap-4" style="display:flex;flex-direction:column;gap:16px;">
            <div class="input-group"><label class="input-label">Full Name</label><input type="text" class="input" placeholder="Adewale Olumide"></div>
            <div class="input-group"><label class="input-label">University Email</label><input type="email" class="input" placeholder="you@university.edu"></div>
            <div class="input-group"><label class="input-label">Phone Number</label><input type="tel" class="input" placeholder="+234 801 234 5678"></div>
            <div class="input-group"><label class="input-label">Password</label><input type="password" class="input" placeholder="Create a password"></div>
            <div class="input-group"><label class="input-label">Confirm Password</label><input type="password" class="input" placeholder="Confirm your password"></div>
            <label class="filter-option" style="font-size:13px;"><div class="filter-checkbox"></div> I agree to the <a href="#" style="margin:0 4px;">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
            <button class="btn btn-primary btn-full">Create Account</button>
          </div>
          <p class="auth-link">Already have an account? <a href="#" onclick="document.getElementById('tabLogin').click()">Log In</a></p>
        </div>
      </div>
    </div>

    <!-- RIGHT: Brand -->
    <div class="auth-brand">
      <div class="animate-fade-up delay-2">
        <p class="text-eyebrow mb-4" style="color:var(--color-teal-dark);">Join 5,000+ students</p>
        <h2 class="auth-brand-title">Order food from campus, in minutes.</h2>
        <p class="auth-brand-desc">Discover vendors, customize meals, pay online, and track your delivery in real time.</p>
      </div>
    </div>
  </div>

  <script>
    const tabLogin = document.getElementById('tabLogin');
    const tabSignup = document.getElementById('tabSignup');
    const formLogin = document.getElementById('formLogin');
    const formSignup = document.getElementById('formSignup');
    tabLogin.addEventListener('click', () => { tabLogin.classList.add('active'); tabSignup.classList.remove('active'); formLogin.style.display = 'block'; formSignup.style.display = 'none'; });
    tabSignup.addEventListener('click', () => { tabSignup.classList.add('active'); tabLogin.classList.remove('active'); formSignup.style.display = 'block'; formLogin.style.display = 'none'; });
  </script>
</body>
</html>
